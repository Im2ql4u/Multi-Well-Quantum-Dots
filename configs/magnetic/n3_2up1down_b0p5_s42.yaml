# N=3 magnetic: 2↑1↓ spin sector, B=0.5, corrected E_ref.
# E_ref = 3.637002 + 0.5*(+1) = 4.137002
allow_missing_dmc: true
run_name: p5_n3_mag_2up_b0p5_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  B_magnitude: 0.5
  B_direction: [0.0, 0.0, 1.0]
  g_factor: 2.0
  mu_B: 1.0
  wells:
    - center: [-4.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [0.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [4.0, 0.0]
      omega: 1.0
      n_particles: 1

spin:
  n_up: 2
  n_down: 1

training:
  epochs: 4000
  lr: 0.0001
  lr_warmup_epochs: 300
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: 4.137002
  alpha_start: 0.0
  alpha_end: 1.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01
  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.15
  sampler_sigma_tails: 0.80
  sampler_sigma_mixed_in: 0.20
  sampler_sigma_mixed_out: 0.50
  sampler_shell_radius: 1.00
  sampler_shell_radius_sigma: 0.05
  sampler_dimer_pairs: 1
  sampler_dimer_eps_max: 0.05
  grad_clip: 0.2
  print_every: 100
  seed: 42
  device: "cuda:0"
  dtype: float64

magnetic_assessment:
  mode: "off"
