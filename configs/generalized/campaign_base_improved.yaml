run_name: improved_base
allow_missing_dmc: true
system:
  type: single_dot
  n_particles: 2
  omega: 1.0
  dim: 2

architecture:
  arch_type: ctnn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 64        # doubled from 32 – matches Jastrow capacity
  bf_layers: 2
  use_backflow: true

training:
  epochs: 30000
  lr: 0.0005
  lr_warmup_epochs: 500    # linear ramp from lr*lr_min_factor to lr
  lr_min_factor: 0.01      # cosine decay ends at lr/100 = 5e-6
  n_coll: 512
  n_cand_mult: 8
  loss_type: fd_colloc      # variance minimisation: minimises Var(E_L), pushes toward eigenstate
  direct_weight: 0.1
  fd_h: 0.01
  min_pair_cutoff: 0.0
  sigma_fs: [0.8, 1.3, 2.0]
  weight_temp: 1.0
  logw_clip_q: 0.0
  langevin_steps: 0
  langevin_step_size: 0.01
  grad_clip: 1.0
  print_every: 50
  seed: 0
  device: cuda:0
  dtype: float64
