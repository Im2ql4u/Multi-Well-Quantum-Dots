    - 9.0
    omega: 1.0
    n_particles: 1
  - center:
    - 9.0
    - 9.0
    omega: 1.0
    n_particles: 1
spin:
  n_up: 8
  n_down: 8
training:
  epochs: 5000
  lr: 0.0001
  lr_warmup_epochs: 400
  lr_min_factor: 0.1
  n_coll: 128
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: autograd
  fd_h: 0.01
  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights:
  - 0.55
  - 0.05
  - 0.2
  - 0.15
  - 0.05
  sampler_sigma_center: 0.2
  sampler_sigma_tails: 1.0
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.7
  sampler_shell_radius: 1.2
  sampler_shell_radius_sigma: 0.06
  sampler_dimer_pairs: 7
  sampler_dimer_eps_max: 0.06
  grad_clip: 0.2
  print_every: 100
  seed: 42
  device: cuda:0
  dtype: float64
