# N=16 electrons in 4×4 grid, d=6.0, no CI ref.
# multi_ref=False, pinn_hidden=256
# Generated by gen_scaling_configs.py
allow_missing_dmc: true
run_name: n16_grid_d6_s42
architecture:
  arch_type: pinn
  pinn_hidden: 256
  pinn_layers: 3
  use_backflow: false
system:
  type: custom
  dim: 2
  coulomb: true
  B_magnitude: 0.0
  wells:
  - center:
    - -9.0
    - -9.0
    omega: 1.0
    n_particles: 1
  - center:
    - -3.0
    - -9.0
    omega: 1.0
    n_particles: 1
  - center:
    - 3.0
    - -9.0
    omega: 1.0
    n_particles: 1
  - center:
    - 9.0
    - -9.0
    omega: 1.0
    n_particles: 1
  - center:
    - -9.0
    - -3.0
    omega: 1.0
    n_particles: 1
  - center:
    - -3.0
    - -3.0
    omega: 1.0
    n_particles: 1
  - center:
    - 3.0
    - -3.0
    omega: 1.0
    n_particles: 1
  - center:
    - 9.0
    - -3.0
    omega: 1.0
    n_particles: 1
  - center:
    - -9.0
    - 3.0
    omega: 1.0
    n_particles: 1
  - center:
    - -3.0
    - 3.0
    omega: 1.0
