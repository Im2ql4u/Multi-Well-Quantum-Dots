# N=8 (1+1+1+1+1+1+1+1) inverse-design baseline (E-ref-free).
# Initial layout: symmetric uniform chain with d=4 (8 wells on x-axis).
# The geometry optimiser will rewrite `system.wells` per outer step.
#
# Designed for scripts/run_inverse_design.py with the `dimer_chain_n8`
# parametrisation: theta = [d1, d2, d3, d4] giving the symmetric bond layout
#   d1 | d2 | d3 | d4 | d3 | d2 | d1
#
# Used for Phase 2B inverse design (engineer end-to-end <S_0.S_7> or J_(0,7))
# and for N=8 d-sweeps / Heisenberg cross-checks.
allow_missing_dmc: true
run_name: invdes_n8_baseline_s42

architecture:
  arch_type: pinn
  multi_ref: true
  pinn_hidden: 96
  pinn_layers: 3
  bf_hidden: 48
  bf_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-14.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [14.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 4000
  lr: 0.0001
  lr_warmup_epochs: 250
  lr_min_factor: 0.1
  n_coll: 1024
  loss_type: residual
  residual_objective: residual
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.70
  sampler_shell_radius: 1.20
  sampler_shell_radius_sigma: 0.06
  sampler_dimer_pairs: 4
  sampler_dimer_eps_max: 0.06

  grad_clip: 0.2
  print_every: 200
  seed: 42
  device: "cuda:0"
  dtype: float64
