# N=2 (1+1) non-MCMC residual training baseline.
# Uses stratified i.i.d. collocation batches (no MH/MCMC in training loop).
allow_missing_dmc: true
run_name: p4_n2_nonmcmc_residual_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: double_dot
  n_left: 1
  n_right: 1
  separation: 4.0
  omega: 1.0
  dim: 2
  coulomb: true

training:
  epochs: 3000
  lr: 0.001
  lr_warmup_epochs: 100
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: 2.25441003  # N=2 exact diag, kappa=1.0, eps=0.01
  alpha_start: 0.0
  alpha_end: 1.0
  alpha_decay_frac: 0.5
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.25, 0.20, 0.25, 0.20, 0.10]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.20
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.90
  sampler_shell_radius: 1.40
  sampler_shell_radius_sigma: 0.08
  sampler_dimer_pairs: 1
  sampler_dimer_eps_max: 0.08

  grad_clip: 1.0
  print_every: 200
  seed: 42
  device: "cuda:5"
  dtype: float64
