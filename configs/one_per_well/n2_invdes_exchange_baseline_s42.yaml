# N=2 inverse-design baseline for the EXCHANGE-GAP target (E-ref-free).
#
# Two-sector run: singlet (n_up=1, n_down=1) + fully polarised triplet
# (n_up=2, n_down=0). The geometry optimiser overrides `system.wells` and
# the `spin` block per sector, so the exact well centres / spin block here
# are placeholders — only the architecture and training recipe matter.
#
# We use the generic spin-determinant ansatz (no singlet permanent) so the
# same recipe trains both sectors. multi_ref=True keeps the orbital block
# expressive enough for the N=2 singlet without needing the dedicated
# permanent.
allow_missing_dmc: true
run_name: invdes_n2_exchange_baseline_s42

architecture:
  arch_type: pinn
  multi_ref: true
  pinn_hidden: 64
  pinn_layers: 2
  use_backflow: false
  singlet: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-1.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [+1.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 3000
  lr: 0.0001
  lr_warmup_epochs: 200
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: residual
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.70
  sampler_shell_radius: 1.20
  sampler_shell_radius_sigma: 0.06
  sampler_dimer_pairs: 1
  sampler_dimer_eps_max: 0.06

  grad_clip: 0.2
  print_every: 200
  seed: 42
  device: "cuda:0"
  dtype: float64
