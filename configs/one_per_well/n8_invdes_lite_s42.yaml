# N=8 (1+1+1+1+1+1+1+1) inverse-design *lite* baseline (E-ref-free).
# Smaller architecture / smaller n_coll than `n8_invdes_baseline_s42.yaml`
# so it fits comfortably in <5 GB of GPU memory on a 2080 Ti shared with
# other users. Uses the same 8-well uniform initial layout (d=4); the
# geometry optimiser will rewrite `system.wells` every outer step.
#
# Designed for `scripts/run_inverse_design.py` with the `dimer_chain_n8`
# parametrisation: theta = [d1, d2, d3, d4] giving the symmetric bond
# layout d1 | d2 | d3 | d4 | d3 | d2 | d1.
#
# Used for Phase 2B inverse design (engineer end-to-end <S_0.S_7>).
allow_missing_dmc: true
run_name: invdes_n8_lite_s42

architecture:
  arch_type: pinn
  multi_ref: true
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-14.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [14.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 2500
  lr: 0.0001
  lr_warmup_epochs: 200
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: residual
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.70
  sampler_shell_radius: 1.20
  sampler_shell_radius_sigma: 0.06
  sampler_dimer_pairs: 4
  sampler_dimer_eps_max: 0.06

  grad_clip: 0.2
  print_every: 200
  seed: 42
  device: "cuda:0"
  dtype: float64
