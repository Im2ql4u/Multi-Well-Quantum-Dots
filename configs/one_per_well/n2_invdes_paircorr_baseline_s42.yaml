allow_missing_dmc: true
run_name: invdes_n2_paircorr_baseline_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  use_backflow: false
  singlet: true

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 2000
  lr: 0.0001
  lr_warmup_epochs: 200
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 1.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.5, 0.05, 0.25, 0.15, 0.05]
  sampler_sigma_center: 0.30
  sampler_sigma_tails: 1.20
  sampler_sigma_mixed_in: 0.35
  sampler_sigma_mixed_out: 0.90
  sampler_shell_radius: 1.50
  sampler_shell_radius_sigma: 0.08
  sampler_dimer_pairs: 1
  sampler_dimer_eps_max: 0.08

  grad_clip: 0.2
  print_every: 200
  seed: 42
  device: "cuda:3"
  dtype: float64
