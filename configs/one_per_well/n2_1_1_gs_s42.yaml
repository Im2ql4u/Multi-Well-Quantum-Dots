# Phase 2.1 one-per-well baseline config for N=2 (1+1).
# Matches known-stable REINFORCE+MH setup and keeps all tunables in config.
allow_missing_dmc: true
run_name: p2_n2_1p1w_gs_s42

architecture:
  # PINN with optional backflow disabled for stability in this baseline.
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  # One particle in each well, separation fixed for exact-diag comparison.
  type: double_dot
  n_left: 1
  n_right: 1
  separation: 4.0
  omega: 1.0
  dim: 2
  coulomb: true

training:
  epochs: 6000
  lr: 0.001
  lr_warmup_epochs: 100
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: reinforce
  fd_h: 0.01
  reinforce_clip_width: 5.0
  sampler: mh
  mh_steps: 10
  mh_step_scale: 0.25
  mh_decorrelation: 1
  grad_clip: 1.0
  print_every: 500
  seed: 42
  device: "cuda:0"
  dtype: float64
