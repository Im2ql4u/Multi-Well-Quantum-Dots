# Phase 4.4 one-per-well baseline config for N=4 (1+1+1+1).
# Uses the same stable REINFORCE setup as validated N=3 runs.
allow_missing_dmc: true
run_name: p4_n4_1p1p1p1w_gs_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  # Four equally spaced wells along x with spacing 4.0.
  type: custom
  dim: 2
  coulomb: true
  smooth_T: 0.2
  B_magnitude: 0.0
  B_direction: [0.0, 0.0, 1.0]
  g_factor: 2.0
  mu_B: 1.0
  # Zeeman targeting options (used only when B_magnitude != 0):
  # zeeman_electron1_only: false
  # zeeman_particle_indices: [0, 2]
  wells:
    - center: [-6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [6.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 6000
  lr: 0.001
  lr_warmup_epochs: 100
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: reinforce
  fd_h: 0.01
  reinforce_clip_width: 5.0
  sampler: mh
  mh_steps: 20
  mh_step_scale: 0.25
  mh_decorrelation: 2
  grad_clip: 1.0
  print_every: 500
  seed: 42
  device: "cuda:5"
  dtype: float64
