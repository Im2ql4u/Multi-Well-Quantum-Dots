# Phase 2.2 smoke config: short GPU sanity run before full training.
allow_missing_dmc: true
run_name: smoke_p2_n2_1p1w_gs_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: double_dot
  n_left: 1
  n_right: 1
  separation: 4.0
  omega: 1.0
  dim: 2
  coulomb: true

training:
  epochs: 120
  lr: 0.001
  lr_warmup_epochs: 20
  lr_min_factor: 0.1
  n_coll: 256
  loss_type: reinforce
  fd_h: 0.01
  reinforce_clip_width: 5.0
  sampler: mh
  mh_steps: 10
  mh_step_scale: 0.25
  mh_decorrelation: 1
  grad_clip: 1.0
  print_every: 20
  seed: 42
  device: "cuda:5"
  dtype: float64
