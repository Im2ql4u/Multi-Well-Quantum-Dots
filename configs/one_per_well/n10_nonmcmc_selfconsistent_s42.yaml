# N=10 (1×10) non-MCMC self-consistent config.
# Wells at x=-18,-14,-10,-6,-2,2,6,10,14,18 (sep=4), omega=1.0.
# No CI reference available for N=10 (product space too large for DVR enumeration).
# Uses pure variance minimization (alpha_end=0) — self-consistent convergence.
# Estimated ground-state energy ~12.7 au (extrapolated from N=8=10.50).
allow_missing_dmc: true
run_name: p5_n10_nonmcmc_selfconsistent_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-18.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-14.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [14.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [18.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 6000
  lr: 0.0001
  lr_warmup_epochs: 400
  lr_min_factor: 0.1
  n_coll: 2048
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: 12.70
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.60
  sampler_shell_radius: 1.20
  sampler_shell_radius_sigma: 0.08
  sampler_dimer_pairs: 5
  sampler_dimer_eps_max: 0.06

  grad_clip: 0.2
  print_every: 100
  seed: 42
  device: "cuda:0"
  dtype: float64
