# N=8 (1+1+1+1+1+1+1+1) inverse-design *fast* baseline.
#
# Even leaner than `n8_invdes_lite_s42.yaml`: trims epochs to 1500 and
# n_coll to 384, while keeping the same compact PINN architecture
# (pinn_hidden=64, pinn_layers=2). Designed for the
# `dimer_pair_n8` (SSH-style two-parameter) inverse-design flagship
# where each outer step costs only 3 trainings (centre + 2 forward FD
# perturbations) so we can afford 8 outer steps overnight on a free
# 2080 Ti.
#
# Per-training wall time on a free GPU should be ~10-15 min;
# per outer step ~30-45 min; full 8-step run ~4-6 hours.
#
# Initial layout: uniform N=8 chain at d=4. The geometry optimiser
# rewrites `system.wells` every outer step.
allow_missing_dmc: true
run_name: invdes_n8_fast_s42

architecture:
  arch_type: pinn
  multi_ref: true
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-14.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [-2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [6.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [10.0, 0.0]
      omega: 1.0
      n_particles: 1
    - center: [14.0, 0.0]
      omega: 1.0
      n_particles: 1

training:
  epochs: 1500
  lr: 0.0001
  lr_warmup_epochs: 150
  lr_min_factor: 0.1
  n_coll: 384
  loss_type: residual
  residual_objective: residual
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.70
  sampler_shell_radius: 1.20
  sampler_shell_radius_sigma: 0.06
  sampler_dimer_pairs: 3
  sampler_dimer_eps_max: 0.06

  grad_clip: 0.2
  print_every: 200
  seed: 42
  device: "cuda:0"
  dtype: float64
