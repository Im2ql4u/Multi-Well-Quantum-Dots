# Phase 2.2 corrective attempt: CTNN + REINFORCE for N=2 one-per-well.
allow_missing_dmc: true
run_name: p2_n2_1p1w_gs_s42_ctnn

architecture:
  arch_type: ctnn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 64
  bf_layers: 2
  use_backflow: true

system:
  type: double_dot
  n_left: 1
  n_right: 1
  separation: 4.0
  omega: 1.0
  dim: 2
  coulomb: true

training:
  epochs: 6000
  lr: 0.0005
  lr_warmup_epochs: 200
  lr_min_factor: 0.1
  n_coll: 256
  n_cand_mult: 8
  loss_type: reinforce
  fd_h: 0.01
  reinforce_clip_width: 5.0
  sampler: mh
  mh_steps: 10
  mh_step_scale: 0.20
  mh_decorrelation: 1
  grad_clip: 1.0
  print_every: 500
  seed: 42
  device: "cuda:5"
  dtype: float64
