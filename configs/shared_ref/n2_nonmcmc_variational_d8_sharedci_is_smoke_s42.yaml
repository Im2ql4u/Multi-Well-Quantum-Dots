# N=2 (1+1) non-MCMC variational smoke run using importance sampling instead of MH.
# Purpose: verify whether the existing importance-resampling path supports stable
# energy minimization for the shared-CI d=8 target without MCMC.
allow_missing_dmc: true
run_name: p4_n2_nonmcmc_variational_d8_sharedci_is_smoke_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false

system:
  type: double_dot
  n_left: 1
  n_right: 1
  separation: 8.0
  omega: 1.0
  dim: 2
  coulomb: true

training:
  epochs: 800
  lr: 0.0001
  lr_warmup_epochs: 100
  lr_min_factor: 0.1
  n_coll: 512
  n_cand_mult: 8
  loss_type: weak_form
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01

  sampler: is
  non_mcmc_only: true
  weight_temp: 1.0
  logw_clip_q: 0.0
  langevin_steps: 0
  langevin_step_size: 0.01

  grad_clip: 0.2
  print_every: 100
  seed: 42
  device: "cuda:0"
  dtype: float64