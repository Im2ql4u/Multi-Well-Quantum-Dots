allow_missing_dmc: true
run_name: p1r_n2_double
architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  bf_hidden: 32
  bf_layers: 2
  use_backflow: false
system:
  type: double_dot
  n_left: 1
  n_right: 1
  separation: 4.0
  omega: 1.0
  dim: 2
  coulomb: false
training:
  epochs: 10000
  lr: 0.001
  lr_warmup_epochs: 100
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: reinforce
  fd_h: 0.01
  reinforce_clip_width: 5.0
  sampler: mh
  mh_steps: 10
  mh_step_scale: 0.25
  mh_decorrelation: 1
  grad_clip: 1.0
  print_every: 500
  seed: 43
  device: "cuda:4"
  dtype: float64
