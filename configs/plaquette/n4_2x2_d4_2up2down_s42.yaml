# N=4 on 2×2 square plaquette, d=4 edge spacing, 2↑2↓, no B field.
# Wells: bottom-left (-2,-2), bottom-right (2,-2), top-right (2,2), top-left (-2,2).
# Inter-well distances: nearest-neighbour = 4.0, diagonal = 4√2 ≈ 5.66.
# Compare with n4_2up2down_b0p5_s42 (1D chain, same d=4 spacing) to probe
# how 2D connectivity changes entanglement and correlation energy.
allow_missing_dmc: true
run_name: n4_plaq2x2_d4_2up2down_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-2.0, -2.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, -2.0]
      omega: 1.0
      n_particles: 1
    - center: [2.0, 2.0]
      omega: 1.0
      n_particles: 1
    - center: [-2.0, 2.0]
      omega: 1.0
      n_particles: 1

spin:
  n_up: 2
  n_down: 2

training:
  epochs: 4000
  lr: 0.0001
  lr_warmup_epochs: 300
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01
  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.70
  sampler_shell_radius: 1.20
  sampler_shell_radius_sigma: 0.06
  sampler_dimer_pairs: 3
  sampler_dimer_eps_max: 0.06
  grad_clip: 0.2
  print_every: 100
  seed: 42
  device: "cuda:0"
  dtype: float64
