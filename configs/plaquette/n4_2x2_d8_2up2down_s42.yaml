# N=4 on 2×2 square plaquette, d=8 edge spacing (Mott limit), 2↑2↓, no B field.
# Wells: bottom-left (-4,-4), bottom-right (4,-4), top-right (4,4), top-left (-4,4).
# At d=8 the electrons are strongly localized; correlation energy and
# entanglement are exponentially suppressed — useful as a Mott-limit benchmark.
allow_missing_dmc: true
run_name: n4_plaq2x2_d8_2up2down_s42

architecture:
  arch_type: pinn
  pinn_hidden: 64
  pinn_layers: 2
  use_backflow: false

system:
  type: custom
  dim: 2
  coulomb: true
  wells:
    - center: [-4.0, -4.0]
      omega: 1.0
      n_particles: 1
    - center: [4.0, -4.0]
      omega: 1.0
      n_particles: 1
    - center: [4.0, 4.0]
      omega: 1.0
      n_particles: 1
    - center: [-4.0, 4.0]
      omega: 1.0
      n_particles: 1

spin:
  n_up: 2
  n_down: 2

training:
  epochs: 4000
  lr: 0.0001
  lr_warmup_epochs: 300
  lr_min_factor: 0.1
  n_coll: 512
  loss_type: residual
  residual_objective: energy_var
  residual_target_energy: null
  alpha_start: 0.0
  alpha_end: 0.0
  alpha_decay_frac: 0.6
  local_energy_clip_width: 5.0
  laplacian_mode: fd
  fd_h: 0.01
  sampler: stratified
  non_mcmc_only: true
  sampler_mix_weights: [0.55, 0.05, 0.20, 0.15, 0.05]
  sampler_sigma_center: 0.20
  sampler_sigma_tails: 1.00
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.70
  sampler_shell_radius: 1.50
  sampler_shell_radius_sigma: 0.08
  sampler_dimer_pairs: 3
  sampler_dimer_eps_max: 0.06
  grad_clip: 0.2
  print_every: 100
  seed: 42
  device: "cuda:0"
  dtype: float64
