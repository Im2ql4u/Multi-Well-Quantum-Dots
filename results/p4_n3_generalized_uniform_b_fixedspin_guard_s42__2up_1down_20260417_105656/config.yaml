allow_missing_dmc: true
architecture:
  arch_type: pinn
  bf_hidden: 32
  bf_layers: 2
  pinn_hidden: 64
  pinn_layers: 2
  use_backflow: false
  use_well_features: true
magnetic_assessment:
  mode: 'off'
run_name: p4_n3_generalized_uniform_b_fixedspin_guard_s42__2up_1down
spin:
  pattern:
  - 0
  - 0
  - 1
spin_sector_scan:
  base_residual_target_energy: 3.0
  constant_energy_shift: 0.5
  sector_residual_target_energy: 3.5
system:
  B_direction:
  - 0.0
  - 0.0
  - 1.0
  B_magnitude: 0.5
  coulomb: true
  dim: 2
  g_factor: 2.0
  mu_B: 1.0
  type: custom
  wells:
  - center:
    - -4.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - 0.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - 4.0
    - 0.0
    n_particles: 1
    omega: 1.0
training:
  alpha_decay_frac: 0.6
  alpha_end: 1.0
  alpha_start: 0.0
  device: cuda
  dtype: float64
  epochs: 2000
  fd_h: 0.01
  grad_clip: 0.2
  laplacian_mode: fd
  local_energy_clip_width: 5.0
  loss_type: residual
  lr: 0.0001
  lr_min_factor: 0.1
  lr_warmup_epochs: 200
  n_coll: 512
  non_mcmc_only: true
  print_every: 100
  residual_objective: energy_var
  residual_target_energy: 3.5
  sampler: stratified
  sampler_dimer_eps_max: 0.08
  sampler_dimer_pairs: 1
  sampler_mix_weights:
  - 0.25
  - 0.2
  - 0.25
  - 0.2
  - 0.1
  sampler_shell_radius: 1.4
  sampler_shell_radius_sigma: 0.08
  sampler_sigma_center: 0.2
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_mixed_out: 0.9
  sampler_sigma_tails: 1.2
  seed: 42
