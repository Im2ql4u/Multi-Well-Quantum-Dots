allow_missing_dmc: true
architecture:
  arch_type: pinn
  bf_hidden: 32
  bf_layers: 2
  pinn_hidden: 64
  pinn_layers: 2
  use_backflow: false
run_name: p5_n8_nonmcmc_residual_s42
system:
  coulomb: true
  dim: 2
  type: custom
  wells:
  - center:
    - -14.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - -10.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - -6.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - -2.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - 2.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - 6.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - 10.0
    - 0.0
    n_particles: 1
    omega: 1.0
  - center:
    - 14.0
    - 0.0
    n_particles: 1
    omega: 1.0
training:
  alpha_decay_frac: 0.6
  alpha_end: 1.0
  alpha_start: 0.0
  device: cuda:0
  epochs: 8000
  fd_h: 0.01
  laplacian_mode: fd
  local_energy_clip_width: 5.0
  loss_type: residual
  lr: 0.0001
  lr_min_factor: 0.1
  lr_warmup_epochs: 400
  n_coll: 2048
  non_mcmc_only: true
  residual_objective: energy_var
  residual_target_energy: 10.5
  sampler: stratified
  sampler_mix_weights:
  - 0.55
  - 0.05
  - 0.2
  - 0.15
  - 0.05
  sampler_sigma_center: 0.2
  sampler_sigma_mixed_in: 0.25
  sampler_sigma_tails: 1.0
